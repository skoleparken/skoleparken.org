{{ define "main" }}
<div class="page-header">
    <div class="container">
        <h1>{{ .Title }}</h1>
        {{ if .Date }}<p class="post-meta">{{ .Date.Format "02. Jan 2006" }}</p>{{ end }}
    </div>
</div>

<div class="container page-content">
    <div class="content-body">
        {{ .Content }}
    </div>
</div>
{{ end }}

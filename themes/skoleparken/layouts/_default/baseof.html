<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "da-dk" }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ .Site.Params.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="{{ "/images/logo_notext.png" | relURL }}">
    <link rel="apple-touch-icon" href="{{ "/images/logo_notext.png" | relURL }}">
    <link rel="stylesheet" href="{{ "/css/style.css" | relURL }}">
</head>
<body>
    <div class="site-wrapper">
        {{ partial "header.html" . }}
        
        <main class="main-content">
            {{ block "main" . }}{{ end }}
        </main>

        {{ partial "footer.html" . }}
    </div>
</body>
</html>
